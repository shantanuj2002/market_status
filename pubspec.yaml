name: market_status
description: "Production-grade Flutter package for global market status — stocks, commodities, futures, and crypto with DST, holidays, and remote calendar sync."
version: 1.0.0
homepage: https://github.com/your-org/market_status
repository: https://github.com/your-org/market_status
issue_tracker: https://github.com/your-org/market_status/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.12

flutter:
  # No assets required - data is fetched remotely or embedded as Dart constants
